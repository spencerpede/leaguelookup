<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark -->
  <g transform="translate(120 165)">
    <rect width="160" height="160" rx="40" fill="#2563eb"/>
    <path d="M48 40 L48 122 L100 122" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="118" cy="58" r="20" stroke="#ffffff" stroke-width="13" fill="none"/>
    <line x1="132" y1="72" x2="144" y2="84" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="320" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="100" font-weight="800" fill="#0f172a" letter-spacing="-3">
    League <tspan fill="#2563eb">Lookup</tspan>
  </text>

  <!-- Tagline -->
  <text x="320" y="328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="34" font-weight="500" fill="#475569">
    Adult sports leagues across the Twin Cities, in one place.
  </text>

  <!-- Sport tags row -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
     font-size="22" font-weight="600" fill="#475569">
    <rect x="120" y="430" width="170" height="48" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="205" y="461" text-anchor="middle">Volleyball</text>

    <rect x="305" y="430" width="170" height="48" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="390" y="461" text-anchor="middle">Pickleball</text>

    <rect x="490" y="430" width="150" height="48" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="565" y="461" text-anchor="middle">Softball</text>

    <rect x="655" y="430" width="135" height="48" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="722" y="461" text-anchor="middle">Hockey</text>

    <rect x="805" y="430" width="125" height="48" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="867" y="461" text-anchor="middle">Soccer</text>

    <rect x="945" y="430" width="120" height="48" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="1005" y="461" text-anchor="middle" fill="#2563eb">+15 more</text>
  </g>

  <!-- URL footer -->
  <text x="120" y="555" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="28" font-weight="600" fill="#2563eb">
    leaguelookup.org
  </text>
  <text x="1080" y="555" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="22" font-weight="400" fill="#94a3b8">
    Free · No ads · No signup
  </text>
</svg>
